<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · BCST</title>
  <link rel="icon" href="../assets/images/LOGO.png" type="image/png">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="auth-page">
  <div class="auth-page__bg" aria-hidden="true"></div>
  <div class="auth-page__wrapper">
    <header class="auth-brand">
      <img src="../assets/images/LOGO.png" alt="" class="auth-brand__logo" width="72" height="72">
      <div>
        <p class="auth-brand__eyebrow">Bohol College of Science &amp; Technology</p>
        <h1 class="auth-brand__title">Sign in</h1>
        <p class="auth-brand__subtitle">Access your student or admin portal</p>
      </div>
    </header>
    <main class="auth-card">
      <div id="flash"></div>
      <form id="login-form" class="form-stack">
        <div class="form-field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn--primary btn--block">Sign in</button>
        <p class="form-footer">Don't have an account? <a href="signup.html">Create one</a></p>
      </form>
    </main>
    <footer class="auth-footer"><small>&copy; 2026 BCST Inc. All rights reserved.</small></footer>
  </div>

    <script>
      (function(){
        const form = document.getElementById('login-form');
        if (!form) return;
        const pwInputs = form.querySelectorAll('input[type="password"]');
        pwInputs.forEach((pw) => {
          const field = pw.closest('.form-field') || pw.parentElement;
          if (!field) return;
          field.classList.add('has-toggle');

          if (!(pw.parentElement && pw.parentElement.classList && pw.parentElement.classList.contains('input-with-toggle'))) {
            const wrapper = document.createElement('div');
            wrapper.className = 'input-with-toggle';
            pw.parentNode.insertBefore(wrapper, pw);
            wrapper.appendChild(pw);
          }

          const wrapper = pw.parentElement;
          if (wrapper.querySelector('.password-toggle')) return;

          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'password-toggle';
          btn.setAttribute('aria-label', 'Show password');
          btn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12s-3.5 6.5-9.5 6.5S2.5 12 2.5 12z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          `;

          btn.addEventListener('click', () => {
            const isPassword = pw.type === 'password';
            pw.type = isPassword ? 'text' : 'password';
            btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
            btn.innerHTML = isPassword ? `
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10.58 10.58A3 3 0 0113.42 13.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2.5 12s3.5-6.5 9.5-6.5c2.02 0 3.9.5 5.42 1.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M21.5 12s-1.86 3.45-5.1 4.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            ` : `
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12s-3.5 6.5-9.5 6.5S2.5 12 2.5 12z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            `;
          });

          wrapper.appendChild(btn);
        });
      })();
    </script>

    <script type="module">
      import { initAuthUI } from '../assets/js/auth-ui.js';
      initAuthUI({
        formId: 'login-form',
        redirectOnAdmin: '../admin/dashboard.html',
        redirectOnUser: 'userdash.html',
        flashId: 'flash'
      });
    </script>
</body>
</html>
