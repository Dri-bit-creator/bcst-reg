<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enrollment · BCST</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="app-shell">
  <aside class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="sidebar__brand">
      <img src="../assets/images/LOGO.png" alt="" class="sidebar__logo" width="40" height="40">
      <div>
        <span class="sidebar__name">BCST</span>
        <span class="sidebar__role">Student</span>
      </div>
    </div>
    <nav class="sidebar__nav">
      <ul>
        <li><a href="userdash.html" class="nav-link">Home</a></li>
        <li><a href="enrollment.html" class="nav-link nav-link--active">Enrollment</a></li>
      </ul>
    </nav>
    <div class="sidebar__footer">
      <p class="sidebar__user" id="sidebar-user-email">User</p>
      <a href="logout.html" class="nav-link nav-link--logout">Sign out</a>
    </div>
  </aside>
  <div class="app-shell__main">
    <header class="topbar">
      <button type="button" class="topbar__menu" id="sidebar-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar__titles">
        <h1 class="topbar__title">Enrollment</h1>
      </div>
    </header>
    <main class="page-content" id="main-content">
      <div id="flash"></div>
      <div class="page-intro"><p>Submit your enrollment information for the current academic term. All required fields must be completed.</p></div>

      <div class="card">
        <form id="enrollment-form" class="form-grid form-grid--3">
          <p class="form-field form-field--full section-title" style="margin:0;">Academic details</p>
          <div class="form-field">
            <label for="student_type">Student type</label>
            <select id="student_type" name="student_type" required>
              <option value="" disabled selected>Select type</option>
              <option value="new">New student</option>
              <option value="old">Old student</option>
            </select>
          </div>
          <div class="form-field"><label for="year_level">Year level</label><input type="text" id="year_level" name="year_level" required></div>
          <div class="form-field"><label for="section">Section</label>
            <select id="section" name="section" required>
              <option value="" disabled selected>Select section</option>
              <option value="A">A</option>
              <option value="B">B</option>
            </select>
          </div>
          <div class="form-field"><label for="semester">Semester</label><input type="text" id="semester" name="semester" required></div>

          <p class="form-field form-field--full section-title" style="margin:0;">Personal details</p>
          <div class="form-field"><label for="last_name">Last name</label><input type="text" id="last_name" name="last_name" required></div>
          <div class="form-field"><label for="given_name">Given name</label><input type="text" id="given_name" name="given_name" required></div>
          <div class="form-field"><label for="middle_name">Middle name</label><input type="text" id="middle_name" name="middle_name"></div>
          <div class="form-field"><label for="gender">Gender</label><select id="gender" name="gender" required><option value="" disabled selected>Select gender</option><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select></div>
          <div class="form-field"><label for="civil_status">Civil status</label><select id="civil_status" name="civil_status" required><option value="" disabled selected>Select status</option><option value="single">Single</option><option value="married">Married</option><option value="widowed">Widowed</option></select></div>
          <div class="form-field"><label for="dob">Date of birth</label><input type="date" id="dob" name="dob" required></div>
          <div class="form-field"><label for="pob">Place of birth</label><input type="text" id="pob" name="pob" required></div>
          <div class="form-field"><label for="contact_number">Contact number</label><input type="tel" id="contact_number" name="contact_number" required maxlength="11" inputmode="numeric" pattern="[0-9]{11}" title="Enter an 11-digit number (digits only)"></div>
          <div class="form-field"><label for="religion">Religion</label><input type="text" id="religion" name="religion" required></div>

          <p class="form-field form-field--full section-title" style="margin:0;">Family &amp; address</p>
          <div class="form-field"><label for="fathers_name">Father's name</label><input type="text" id="fathers_name" name="fathers_name" required></div>
          <div class="form-field"><label for="mothers_name">Mother's name</label><input type="text" id="mothers_name" name="mothers_name" required></div>
          <div class="form-field"><label for="parents_contact">Parents' contact</label><input type="tel" id="parents_contact" name="parents_contact" required pattern="[0-9+()\-\s]*"></div>
          <div class="form-field form-field--full"><label for="address">Address</label><textarea id="address" name="address" required></textarea></div>

          <div class="form-field form-field--full form-actions"><button type="submit" class="btn btn--primary">Submit enrollment</button></div>
        </form>
      </div>
    </main>
    <footer class="page-footer"><small>&copy; 2026 BCST Inc.</small></footer>
  </div>

  <script src="../assets/js/app.js" defer></script>
  <script type="module">
    import { requireAuth } from '../assets/js/auth-ui.js';
    import { db, collection, addDoc, getDocs, query, where } from '../assets/js/firebase.js';

    function showFlash(msg, type = 'info') {
      const el = document.getElementById('flash');
      el.innerHTML = `<div class="alert alert--${type}" role="alert">${msg}</div>`;
      setTimeout(() => el.innerHTML = '', 4000);
    }

    // Track current signed-in user so we can attach owner UID to enrollment records
    let currentUser = null;

    async function hasSubmittedEnrollment(uid) {
      if (!uid) return false;
      const q = query(collection(db, 'enrollment'), where('owner', '==', uid));
      const snap = await getDocs(q);
      return snap.size > 0;
    }

    requireAuth({ requireAdmin: false, redirectTo: 'login.html', onAuthorized: async (user, userData) => {
      currentUser = user;
      document.getElementById('sidebar-user-email').textContent = userData?.email || user.email;
      try {
        const already = await hasSubmittedEnrollment(currentUser.uid);
        if (already) {
          showFlash('You have submitted your enrollment.', 'info');
          const submitBtn = document.querySelector('#enrollment-form .form-actions button[type="submit"]') || document.querySelector('#enrollment-form button[type="submit"]');
          if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.textContent = 'Enrollment submitted';
          }
        }
      } catch (err) {
        console.warn('Error checking existing enrollment:', err);
      }
    }});

    const form = document.getElementById('enrollment-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentUser) { showFlash('You must be signed in to submit enrollment.', 'warning'); return; }

      const data = {};
      const fields = ['student_type','year_level','section','semester','last_name','given_name','middle_name','gender','civil_status','dob','pob','contact_number','fathers_name','mothers_name','parents_contact','address','religion'];
      for (const k of fields) data[k] = (document.getElementById(k)?.value || '').trim();

      // Basic required check
      const required = ['student_type','year_level','section','semester','last_name','given_name','gender','civil_status','dob','pob','contact_number','fathers_name','mothers_name','parents_contact','address','religion'];
      for (const r of required) {
        if (!data[r]) { showFlash('Please fill in all required fields.', 'warning'); return; }
      }

      // Normalize and validate contact number: remove non-digits and require exactly 11 digits
      const cleanedPhone = (data.contact_number || '').replace(/\D/g, '');
      if (!/^\d{11}$/.test(cleanedPhone)) { showFlash('Contact number must be 11 digits (digits only).', 'warning'); return; }
      data.contact_number = cleanedPhone;

      // Attach owner UID and timestamp
      data.owner = currentUser.uid;
      data.created_at = new Date().toISOString();

      try {
        // Prevent duplicate submissions by checking again on submit
        const already = await hasSubmittedEnrollment(currentUser.uid);
        if (already) { showFlash('You have submitted your enrollment.', 'info'); return; }

        await addDoc(collection(db, 'enrollment'), data);
        showFlash('Enrollment submitted successfully.', 'success');
        // Disable form after successful submission
        const submitBtn = document.querySelector('#enrollment-form .form-actions button[type="submit"]') || document.querySelector('#enrollment-form button[type="submit"]');
        if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Enrollment submitted'; }
        form.reset();
      } catch (err) {
        showFlash('Database error: ' + (err.message || err), 'error');
      }
    });
  </script>
</body>
</html>
