<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Admin · BCST</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="auth-page">
  <main class="page-center">
    <div class="card" style="max-width:480px; width:100%;">
      <h1>Create Admin</h1>
      <div id="flash"></div>
      <form id="create-admin-form">
        <div class="form-field"><label for="name">Name</label><input id="name" name="name" required></div>
        <div class="form-field"><label for="email">Email</label><input id="email" name="email" type="email" required></div>
        <div class="form-field"><label for="password">Password</label><input id="password" name="password" type="password" required></div>
        <div class="form-field form-actions"><button type="submit" class="btn btn--primary">Create admin</button></div>
      </form>
      <p style="font-size:90%; color:#666; margin-top:8px;">This page allows one-time creation of an administrator account. It will be disabled once an admin exists.</p>
    </div>
  </main>

  <script src="../assets/js/app.js" defer></script>
  <script type="module">
    import { firebaseReady, auth, db, collection, getDocs, query, where, createUserWithEmailAndPassword, doc, setDoc, serverTimestamp } from '../assets/js/firebase.js';

    function showFlash(msg, type = 'info') {
      const el = document.getElementById('flash');
      el.innerHTML = `<div class="alert alert--${type}" role="alert">${msg}</div>`;
      setTimeout(() => el.innerHTML = '', 5000);
    }

    async function adminExists() {
      try {
        const q = query(collection(db, 'users'), where('role', '==', 'admin'));
        const snap = await getDocs(q);
        return snap.size > 0;
      } catch (err) {
        console.error('adminExists check failed', err);
        return false;
      }
    }

    const form = document.getElementById('create-admin-form');

    // On load, wait for Firebase then check if an admin already exists.
    // If an admin exists, redirect to login to avoid exposing this setup page.
    (async () => {
      try {
        await firebaseReady;
        const exists = await adminExists();
        if (exists) {
          showFlash('Administrator account already exists. Redirecting to login...', 'warning');
          setTimeout(() => { window.location.href = '../public/login.html'; }, 900);
          return;
        }
      } catch (err) {
        console.error(err);
      }
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!name || !email || !password) { showFlash('All fields are required.', 'warning'); return; }
      try {
        const exists = await adminExists();
        if (exists) { showFlash('Admin already exists. Aborting.', 'warning'); return; }

        await firebaseReady;
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        // If createUserWithEmailAndPassword requires auth instance, rely on default from firebase.js by passing nothing
        const uid = userCred.user.uid;
        await setDoc(doc(db, 'users', uid), { name, email, role: 'admin', created_at: serverTimestamp() });
        showFlash('Administrator account created. You can now sign in.', 'success');
        form.reset();
      } catch (err) {
        console.error('Failed to create admin:', err);
        showFlash('Failed to create admin: ' + (err.message || err), 'error');
      }
    });
  </script>
</body>
</html>
