<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create admin · BCST</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <main style="max-width:720px;margin:2rem auto;">
    <h1>Create Admin</h1>
    <div id="flash"></div>
    <form id="create-admin-form">
      <div class="form-field"><label for="name">Full name</label><input id="name" required></div>
      <div class="form-field"><label for="email">Email</label><input id="email" type="email" required></div>
      <div class="form-field"><label for="password">Password</label><input id="password" type="password" required></div>
      <div style="margin-top:1rem;"><button class="btn btn--primary" type="submit">Create admin</button></div>
    </form>
  </main>

  <script type="module">
    import { createUserWithEmailAndPassword, db, doc, setDoc } from '../assets/js/firebase.js';
    import { auth } from '../assets/js/firebase.js';

    function showFlash(msg, type='info') { document.getElementById('flash').innerHTML = `<div class="alert alert--${type}">${msg}</div>`; }

    document.getElementById('create-admin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'users', userCred.user.uid), { name, email, role: 'admin' });
        showFlash('Admin created successfully.', 'success');
      } catch (err) {
        showFlash(err.message || 'Failed to create admin', 'error');
      }
    });
  </script>
</body>
</html>
