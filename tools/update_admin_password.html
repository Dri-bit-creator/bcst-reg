<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset admin password · BCST</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <main style="max-width:720px;margin:2rem auto;">
    <h1>Send password reset</h1>
    <div id="flash"></div>
    <form id="reset-form">
      <div class="form-field"><label for="email">Email</label><input id="email" type="email" required></div>
      <div style="margin-top:1rem;"><button class="btn btn--primary" type="submit">Send reset email</button></div>
    </form>
  </main>

  <script type="module">
    import { sendPasswordResetEmail } from '../assets/js/firebase.js';
    import { auth } from '../assets/js/firebase.js';
    function showFlash(msg, type='info') { document.getElementById('flash').innerHTML = `<div class="alert alert--${type}">${msg}</div>`; }
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      try { await sendPasswordResetEmail(auth, email); showFlash('Password reset email sent.', 'success'); }
      catch (err) { showFlash(err.message || 'Failed to send reset email', 'error'); }
    });
  </script>
</body>
</html>
