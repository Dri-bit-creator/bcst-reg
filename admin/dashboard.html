<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard · BCST</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="app-shell">
  <aside class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="sidebar__brand">
      <img src="../assets/images/LOGO.png" alt="" class="sidebar__logo" width="40" height="40">
      <div>
        <span class="sidebar__name">BCST</span>
        <span class="sidebar__role">Admin</span>
      </div>
    </div>
    <nav class="sidebar__nav">
      <ul>
        <li><a href="dashboard.html" class="nav-link nav-link--active">Dashboard</a></li>
        <li><a href="records.html" class="nav-link">Student Records</a></li>
      </ul>
    </nav>
    <div class="sidebar__footer">
      <p class="sidebar__user" id="sidebar-user-email">admin</p>
      <a href="../public/logout.html" class="nav-link nav-link--logout">Sign out</a>
    </div>
  </aside>
  <div class="app-shell__main">
    <header class="topbar">
      <button type="button" class="topbar__menu" id="sidebar-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar__titles"><h1 class="topbar__title">Dashboard</h1></div>
    </header>
    <main class="page-content" id="main-content">
      <div id="stats" class="card-grid"></div>
    </main>
    <footer class="page-footer"><small>&copy; 2026 BCST Inc.</small></footer>
  </div>

  <script src="../assets/js/app.js" defer></script>
  <script type="module">
    import { requireAuth } from '../assets/js/auth-ui.js';
    import { db, collection, getDocs } from '../assets/js/firebase.js';

    function card(title, subtitle) {
      const el = document.createElement('article');
      el.className = 'card';
      el.innerHTML = `<h2 class="card__title">${title}</h2><p class="card__text">${subtitle}</p>`;
      return el;
    }

    requireAuth({ requireAdmin: true, redirectTo: '../public/login.html', onAuthorized: async (user) => {
      document.getElementById('sidebar-user-email').textContent = user.email;
      const enrollSnap = await getDocs(collection(db, 'enrollment'));
      const stats = document.getElementById('stats');
      stats.appendChild(card('Enrollment records', `${enrollSnap.size} student(s)`));
    }});
  </script>
</body>
</html>
