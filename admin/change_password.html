<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password · Admin · BCST</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="app-shell">
  <main class="page-center">
    <div class="card" style="max-width:560px; width:100%;">
      <h1>Change Administrator Password</h1>
      <div id="flash"></div>

      <section>
        <h2>Update password (requires current password)</h2>
        <form id="update-password-form">
          <div class="form-field"><label for="current_password">Current password</label><input id="current_password" type="password" required></div>
          <div class="form-field"><label for="new_password">New password</label><input id="new_password" type="password" required></div>
          <div class="form-field form-actions"><button type="submit" class="btn btn--primary">Change password</button></div>
        </form>
      </section>

      <hr>

      <section>
        <h2>Send password reset email</h2>
        <p>If you prefer, send a password reset email to the admin address.</p>
        <div class="form-field form-actions"><button id="send-reset" class="btn">Send reset email</button></div>
      </section>
    </div>
  </main>

  <script src="../assets/js/app.js" defer></script>
  <script type="module">
    import { requireAuth } from '../assets/js/auth-ui.js';
    import { firebaseReady, auth, sendPasswordResetEmail, reauthenticateWithCredential, EmailAuthProvider, updatePassword } from '../assets/js/firebase.js';

    function showFlash(msg, type = 'info') {
      const el = document.getElementById('flash');
      el.innerHTML = `<div class="alert alert--${type}" role="alert">${msg}</div>`;
      setTimeout(() => el.innerHTML = '', 5000);
    }

    requireAuth({ requireAdmin: true, redirectTo: '../public/login.html', onAuthorized: async (user) => {
      // wire up forms
      const updateForm = document.getElementById('update-password-form');
      updateForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const current = document.getElementById('current_password').value;
        const neu = document.getElementById('new_password').value;
        if (!current || !neu) { showFlash('Fill in both fields.', 'warning'); return; }
        try {
          await firebaseReady;
          const cred = EmailAuthProvider.credential(user.email, current);
          await reauthenticateWithCredential(auth.currentUser, cred);
          await updatePassword(auth.currentUser, neu);
          showFlash('Password updated successfully.', 'success');
          updateForm.reset();
        } catch (err) {
          console.error('Password update failed:', err);
          showFlash('Password update failed: ' + (err.message || err), 'error');
        }
      });

      const sendBtn = document.getElementById('send-reset');
      sendBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        try {
          await firebaseReady;
          await sendPasswordResetEmail(auth, user.email);
          showFlash('Password reset email sent to ' + user.email, 'success');
        } catch (err) {
          console.error('Failed to send reset email:', err);
          showFlash('Failed to send reset email: ' + (err.message || err), 'error');
        }
      });
    }});
  </script>
</body>
</html>
